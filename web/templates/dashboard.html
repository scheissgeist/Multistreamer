<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multistreamer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
}

.layout {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
}

h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
}

.panels {
    display: grid;
    gap: 16px;
}

.panel {
    background: #141414;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 16px;
}

.panel-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

/* Status indicators */
.status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1a;
}
.status-row:last-child { border-bottom: none; }

.status-label { color: #aaa; }
.status-value { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
.status-ok { color: #4caf50; }
.status-err { color: #f44336; }
.status-warn { color: #ff9800; }
.status-na { color: #555; }

/* Dot indicator */
.dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
}
.dot-green { background: #4caf50; }
.dot-red { background: #f44336; }
.dot-yellow { background: #ff9800; }
.dot-gray { background: #555; }

/* Stream info form */
.form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}

input[type="text"] {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 3px;
    color: #e0e0e0;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
}
input[type="text"]:focus { border-color: #555; }
input[type="text"]::placeholder { color: #555; }

/* Buttons */
button {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    color: #e0e0e0;
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
}
button:hover { border-color: #555; background: #222; }
button:active { background: #2a2a2a; }
button:disabled { opacity: 0.3; cursor: not-allowed; }

button.primary {
    background: #1b3a1b;
    border-color: #2d5a2d;
    color: #4caf50;
}
button.primary:hover { background: #224422; border-color: #3a6e3a; }

button.danger {
    background: #3a1a1a;
    border-color: #5a2d2d;
    color: #f44336;
}
button.danger:hover { background: #442222; border-color: #6e3a3a; }

.btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

/* Logs */
.log-box {
    background: #0e0e0e;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    padding: 10px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: #999;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 16px;
    border-radius: 3px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
    z-index: 100;
}
.toast-ok { background: #1b3a1b; border: 1px solid #2d5a2d; color: #4caf50; }
.toast-err { background: #3a1a1a; border: 1px solid #5a2d2d; color: #f44336; }

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Streams list */
.stream-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
}

/* Config badges */
.config-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.config-badge {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid #222;
    background: #1a1a1a;
}
.config-badge.ready { border-color: #2d5a2d; color: #4caf50; }
.config-badge.missing { border-color: #5a2d2d; color: #f44336; }

/* Two column on wider screens */
@media (min-width: 640px) {
    .panels { grid-template-columns: 1fr 1fr; }
    .panel-wide { grid-column: 1 / -1; }
}
</style>
</head>
<body>
<div class="layout">
    <h1>Multistreamer</h1>

    <div class="panels">

        <!-- Status -->
        <div class="panel">
            <div class="panel-title">Server Status</div>
            <div id="status-content">
                <div style="color: #555">Loading...</div>
            </div>
            <div class="btn-row">
                <button onclick="refreshStatus()">Refresh</button>
                <button onclick="doRestart()" class="danger">Restart</button>
            </div>
        </div>

        <!-- Config -->
        <div class="panel">
            <div class="panel-title">Configuration</div>
            <div id="config-content">
                <div style="color: #555">Loading...</div>
            </div>
            <div class="btn-row">
                <button onclick="doDeploy()" class="primary">Deploy</button>
            </div>
        </div>

        <!-- Go Live -->
        <div class="panel panel-wide">
            <div class="panel-title">Stream Info</div>
            <div class="form-row">
                <input type="text" id="input-title" placeholder="Stream title">
            </div>
            <div class="form-row">
                <input type="text" id="input-game" placeholder="Game / Category">
            </div>
            <div class="btn-row">
                <button onclick="doGoLive()" class="primary">Set Title + Game</button>
                <button onclick="doTitle()">Title Only</button>
                <button onclick="doGame()">Game Only</button>
            </div>
            <div id="golive-result" style="margin-top: 10px; font-size: 13px;"></div>
        </div>

        <!-- Logs -->
        <div class="panel panel-wide">
            <div class="panel-title">SRS Logs</div>
            <div id="log-box" class="log-box">Click "Load Logs" to fetch.</div>
            <div class="btn-row">
                <button onclick="loadLogs()">Load Logs</button>
            </div>
        </div>

    </div>
</div>

<script>
function toast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/' + path, opts);
    return res.json();
}

// ── Status ──

async function refreshStatus() {
    const el = document.getElementById('status-content');
    el.innerHTML = '<div style="color:#555">Checking...</div>';

    const data = await api('GET', 'status');
    if (!data.ok) {
        el.innerHTML = `<div class="status-err">${data.error || 'Failed to reach server'}</div>`;
        return;
    }

    let html = '';

    // SRS
    html += statusRow('SRS', data.srs_online, data.srs_online ? 'Online' : 'Offline');

    // Stunnel
    const stOk = data.stunnel === 'active';
    html += statusRow('Stunnel', stOk, data.stunnel);

    // Containers
    const containers = data.containers || {};
    for (const [name, status] of Object.entries(containers)) {
        const up = status.toLowerCase().includes('up');
        const short = name.replace('multistream-', '');
        html += statusRow(short, up, status);
    }

    // Active streams
    const streams = data.streams || [];
    if (streams.length > 0) {
        html += '<div style="margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px;">';
        for (const s of streams) {
            html += `<div class="stream-item"><span class="dot dot-green"></span>${s.app || ''}/${s.name || ''}</div>`;
        }
        html += '</div>';
    } else {
        html += '<div style="margin-top: 8px; color: #555; font-size: 12px;">No active streams</div>';
    }

    el.innerHTML = html;
}

function statusRow(label, ok, value) {
    const dotClass = ok ? 'dot-green' : 'dot-red';
    const valClass = ok ? 'status-ok' : 'status-err';
    return `<div class="status-row">
        <span class="status-label"><span class="dot ${dotClass}"></span>${label}</span>
        <span class="status-value ${valClass}">${value}</span>
    </div>`;
}

// ── Config ──

async function refreshConfig() {
    const el = document.getElementById('config-content');
    const data = await api('GET', 'config');

    let html = '<div class="config-row">';
    html += badge('Server', data.server_ip);
    html += badge('Twitch Key', data.has_twitch_key);
    html += badge('Kick Key', data.has_kick_key);
    html += badge('Twitch API', data.has_twitch_api);
    html += badge('Kick API', data.has_kick_api);
    html += '</div>';

    if (data.server_ip) {
        html += `<div style="margin-top: 8px; font-size: 12px; color: #666;">
            OBS: rtmp://${data.server_ip}/live — Key: livestream
        </div>`;
    }

    el.innerHTML = html;
}

function badge(label, ok) {
    const cls = ok ? 'ready' : 'missing';
    const symbol = ok ? '\u2713' : '\u2717';
    return `<span class="config-badge ${cls}">${symbol} ${label}</span>`;
}

// ── Actions ──

async function doRestart() {
    toast('Restarting...', true);
    const data = await api('POST', 'restart');
    toast(data.ok ? 'Restarted' : 'Restart failed', data.ok);
    setTimeout(refreshStatus, 2000);
}

async function doDeploy() {
    toast('Deploying...', true);
    const data = await api('POST', 'deploy');
    toast(data.ok ? 'Deployed' : 'Deploy failed', data.ok);
    setTimeout(refreshStatus, 3000);
}

async function doGoLive() {
    const title = document.getElementById('input-title').value.trim();
    const game = document.getElementById('input-game').value.trim();
    if (!title && !game) { toast('Enter a title or game', false); return; }

    const el = document.getElementById('golive-result');
    el.textContent = 'Setting...';
    const data = await api('POST', 'golive', { title, game });

    if (data.ok) {
        const r = data.results;
        let msg = '';
        if (r.twitch) msg += `Twitch: ${r.twitch}`;
        if (r.kick) msg += `${msg ? '  ·  ' : ''}Kick: ${r.kick}`;
        el.innerHTML = `<span class="${r.twitch === 'updated' && r.kick === 'updated' ? 'status-ok' : 'status-warn'}">${msg}</span>`;
    } else {
        el.innerHTML = `<span class="status-err">${data.error || 'Failed'}</span>`;
    }
}

async function doTitle() {
    const title = document.getElementById('input-title').value.trim();
    if (!title) { toast('Enter a title', false); return; }
    const el = document.getElementById('golive-result');
    el.textContent = 'Setting title...';
    const data = await api('POST', 'golive', { title, game: '' });
    if (data.ok) {
        const r = data.results;
        el.innerHTML = `<span class="status-ok">Twitch: ${r.twitch || 'skipped'}  ·  Kick: ${r.kick || 'skipped'}</span>`;
    } else {
        el.innerHTML = `<span class="status-err">${data.error || 'Failed'}</span>`;
    }
}

async function doGame() {
    const game = document.getElementById('input-game').value.trim();
    if (!game) { toast('Enter a game', false); return; }
    const el = document.getElementById('golive-result');
    el.textContent = 'Setting game...';
    const data = await api('POST', 'golive', { title: '', game });
    if (data.ok) {
        const r = data.results;
        el.innerHTML = `<span class="status-ok">Twitch: ${r.twitch || 'skipped'}  ·  Kick: ${r.kick || 'skipped'}</span>`;
    } else {
        el.innerHTML = `<span class="status-err">${data.error || 'Failed'}</span>`;
    }
}

// ── Logs ──

async function loadLogs() {
    const el = document.getElementById('log-box');
    el.textContent = 'Loading...';
    const data = await api('GET', 'logs');
    el.textContent = data.output || 'No logs available';
    el.scrollTop = el.scrollHeight;
}

// ── Init ──

refreshStatus();
refreshConfig();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multistreamer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #f5f3f0;
    color: #2d2a26;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
}

.wrap {
    max-width: 520px;
    margin: 60px auto;
    padding: 0 24px;
}

/* Header */
.header {
    margin-bottom: 32px;
}

.header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1a1816;
}

.header p {
    font-size: 13px;
    color: #8a847c;
    margin-top: 2px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
}

/* Platforms row */
.platforms {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
}

.platform {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: #fff;
    border: 1px solid #e5e1dc;
    border-radius: 3px;
    font-size: 13px;
    color: #4a453e;
}

.platform .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.dot-on { background: #3d9a50; }
.dot-off { background: #c4bfb8; }
.dot-live { background: #3d9a50; animation: pulse 2s infinite; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* Stream info form */
.stream-form {
    margin-bottom: 28px;
}

.field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
}

input[type="text"] {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #ddd9d3;
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    color: #2d2a26;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
}

input:focus { border-color: #a09a92; }
input::placeholder { color: #c4bfb8; }

.target-row {
    display: flex;
    gap: 14px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #6b655e;
}

.target-row label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.target-row input[type="checkbox"] {
    accent-color: #2d2a26;
}

.btns { display: flex; gap: 6px; flex-wrap: wrap; }

button {
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid #ddd9d3;
    border-radius: 3px;
    background: #fff;
    color: #4a453e;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
}

button:hover { background: #f0ece8; border-color: #c4bfb8; }
button:active { background: #e8e4df; }

button.primary {
    background: #2d2a26;
    color: #f5f3f0;
    border-color: #2d2a26;
}
button.primary:hover { background: #3d3a36; }

/* Feedback line */
.feedback {
    margin-top: 8px;
    font-size: 13px;
    min-height: 20px;
    color: #8a847c;
}

.feedback .ok { color: #3d9a50; }
.feedback .fail { color: #c4423a; }

/* Divider */
hr {
    border: none;
    border-top: 1px solid #e5e1dc;
    margin: 24px 0;
}

/* Server section */
.server-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

/* Logs */
.log-box {
    background: #fff;
    border: 1px solid #e5e1dc;
    border-radius: 3px;
    padding: 10px 12px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    max-height: 240px;
    overflow-y: auto;
    color: #6b655e;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 10px;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    background: #2d2a26;
    color: #f5f3f0;
    border-radius: 3px;
    font-size: 13px;
    animation: slideup 0.15s ease;
}

@keyframes slideup {
    from { opacity: 0; transform: translateX(-50%) translateY(4px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Platforms that are configured but not connected */
.platform.unconfigured {
    opacity: 0.5;
    border-style: dashed;
}

@media (max-width: 500px) {
    .field-row { grid-template-columns: 1fr; }
    .wrap { margin: 24px auto; }
}
</style>
</head>
<body>
<div class="wrap">

    <div class="header">
        <h1>Multistreamer</h1>
        <p id="obs-url"></p>
    </div>

    <div id="platforms" class="platforms"></div>

    <div class="stream-form">
        <div class="field-row">
            <input type="text" id="title" placeholder="Stream title">
            <input type="text" id="game" placeholder="Game or category">
        </div>
        <div class="target-row">
            <label><input type="checkbox" id="tgt-twitch" checked> Twitch</label>
            <label><input type="checkbox" id="tgt-kick" checked> Kick</label>
        </div>
        <div class="btns">
            <button class="primary" onclick="go('both')">Update all</button>
            <button onclick="go('title')">Title only</button>
            <button onclick="go('game')">Game only</button>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <hr>

    <div class="server-btns">
        <button onclick="act('deploy')">Deploy</button>
        <button onclick="act('restart')">Restart</button>
        <button onclick="toggleLogs()">Logs</button>
    </div>
    <div id="log-wrap" style="display:none;">
        <div id="log" class="log-box"></div>
    </div>

</div>

<script>
async function api(m, p, b) {
    try {
        const r = await fetch('/api/'+p, {method:m, headers:{'Content-Type':'application/json'}, body:b?JSON.stringify(b):undefined});
        return r.json();
    } catch(e) { return {ok:false, error:e.message} }
}

function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
}

// Status
async function refresh() {
    const el = document.getElementById('platforms');
    const obs = document.getElementById('obs-url');

    const [status, config] = await Promise.all([
        api('GET', 'status'),
        api('GET', 'config')
    ]);

    // OBS connection string
    if (config.server_ip)
        obs.textContent = 'rtmp://' + config.server_ip + '/live  key: livestream';
    else
        obs.textContent = 'Set SERVER_IP in .env';

    if (!status.ok) {
        el.innerHTML = platform('Server', false);
        return;
    }

    let html = '';
    const isLive = (status.streams || []).length > 0;

    // Show each container as a platform
    const containers = status.containers || {};
    for (const [name, st] of Object.entries(containers)) {
        const short = name.replace('multistream-', '');
        const up = st.toLowerCase().includes('up');
        html += platform(short, up, isLive && up);
    }

    // Show SRS and stunnel
    html += platform('srs', status.srs_online, isLive && status.srs_online);
    html += platform('stunnel', status.stunnel === 'active');

    el.innerHTML = html;
}

function platform(name, ok, live) {
    const cls = live ? 'dot-live' : (ok ? 'dot-on' : 'dot-off');
    return `<div class="platform"><span class="dot ${cls}"></span>${name}</div>`;
}

// Set stream info
async function go(mode) {
    const title = document.getElementById('title').value.trim();
    const game = document.getElementById('game').value.trim();
    const el = document.getElementById('feedback');

    if (mode === 'both' && !title && !game) { toast('Enter something first'); return; }
    if (mode === 'title' && !title) { toast('Enter a title'); return; }
    if (mode === 'game' && !game) { toast('Enter a game'); return; }

    const platforms = [];
    if (document.getElementById('tgt-twitch').checked) platforms.push('twitch');
    if (document.getElementById('tgt-kick').checked) platforms.push('kick');
    if (!platforms.length) { toast('Select at least one platform'); return; }

    el.textContent = 'Updating...';
    el.className = 'feedback';

    const d = await api('POST', 'golive', {
        title: mode === 'game' ? '' : title,
        game: mode === 'title' ? '' : game,
        platforms
    });

    if (d.ok) {
        const r = d.results;
        const parts = [];
        if (r.twitch) parts.push(`<span class="${r.twitch === 'updated' ? 'ok' : 'fail'}">Twitch: ${r.twitch}</span>`);
        if (r.kick) parts.push(`<span class="${r.kick === 'updated' ? 'ok' : 'fail'}">Kick: ${r.kick}</span>`);
        el.innerHTML = parts.join(' &middot; ');
    } else {
        el.innerHTML = `<span class="fail">${d.error || 'Failed'}</span>`;
    }
}

// Server actions
async function act(cmd) {
    toast(cmd.charAt(0).toUpperCase() + cmd.slice(1) + 'ing...');
    const d = await api('POST', cmd);
    toast(d.ok ? 'Done' : (d.error || 'Failed'));
    setTimeout(refresh, 2500);
}

// Logs
let logsOpen = false;
function toggleLogs() {
    const w = document.getElementById('log-wrap');
    logsOpen = !logsOpen;
    w.style.display = logsOpen ? 'block' : 'none';
    if (logsOpen) loadLogs();
}

async function loadLogs() {
    const el = document.getElementById('log');
    el.textContent = 'Loading...';
    const d = await api('GET', 'logs');
    el.textContent = d.output || 'No logs available';
    el.scrollTop = el.scrollHeight;
}

// Enter key submits
document.getElementById('title').onkeydown = e => { if (e.key === 'Enter') go('both'); };
document.getElementById('game').onkeydown = e => { if (e.key === 'Enter') go('both'); };

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>

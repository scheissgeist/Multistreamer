<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multistreamer</title>
<style>
:root {
    --bg: #050508;
    --bg-panel: #0c0c10;
    --bg-elevated: #111116;
    --bg-hover: #16161c;
    --border: #1c1c24;
    --border-active: #2a2a35;
    --text-primary: #e2e2e8;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --green: #3ecf6e;
    --green-dim: #1a3a24;
    --red: #e54545;
    --red-dim: #3a1a1a;
    --amber: #e8a820;
    --amber-dim: #3a2a10;
    --blue: #4a8af5;
    --blue-dim: #1a2540;
    --mono: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow-y: auto;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Layout ── */

.app {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
}

.header-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
}

.header-status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-secondary);
}

.main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 1px;
    background: var(--border);
}

/* ── Panels ── */

.panel {
    background: var(--bg-panel);
    padding: 16px 20px;
}

.panel-full { grid-column: 1 / -1; }

.panel-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

/* ── Status Grid ── */

.status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.status-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 2px;
}

.status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.dot-live {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: breathe 2s ease-in-out infinite;
}
.dot-ok { background: var(--green); }
.dot-err { background: var(--red); }
.dot-warn { background: var(--amber); }
.dot-off { background: var(--text-muted); }

@keyframes breathe {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
}

.status-name {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.status-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-primary);
}

/* ── Stream activity ── */

.stream-live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    background: var(--green-dim);
    border: 1px solid #2a5a35;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    margin-top: 10px;
}

.no-streams {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 10px;
}

/* ── Config ── */

.config-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.config-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    color: var(--text-secondary);
}

.config-item.ok { border-color: #2a5a35; color: var(--green); }
.config-item.missing { border-color: #5a2a2a; color: var(--red); }

.obs-hint {
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    user-select: all;
}

/* ── Stream Info Form ── */

.form-group {
    margin-bottom: 8px;
}

.form-label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
}

input[type="text"] {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
}
input[type="text"]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(74, 138, 245, 0.12);
}
input[type="text"]::placeholder { color: var(--text-muted); }

/* ── Buttons ── */

.btn-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
}

button {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
}
button:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--border-active);
}
button:active { background: var(--border); }
button:disabled { opacity: 0.25; cursor: not-allowed; }

button.act-primary {
    background: var(--green-dim);
    border-color: #2a5a35;
    color: var(--green);
}
button.act-primary:hover { background: #1f4a2e; border-color: #3a7a45; }

button.act-danger {
    background: var(--red-dim);
    border-color: #5a2a2a;
    color: var(--red);
}
button.act-danger:hover { background: #4a2020; border-color: #7a3a3a; }

button.act-blue {
    background: var(--blue-dim);
    border-color: #2a3a5a;
    color: var(--blue);
}
button.act-blue:hover { background: #1f2f4a; border-color: #3a5a8a; }

/* ── Result feedback ── */

.result {
    margin-top: 8px;
    font-size: 12px;
    min-height: 18px;
}

.result-ok { color: var(--green); }
.result-err { color: var(--red); }
.result-pending { color: var(--amber); }

/* ── Logs ── */

.log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.7;
    max-height: 400px;
    min-height: 120px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-muted);
    tab-size: 4;
}

/* ── Toast ── */

.toast {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 8px 14px;
    border-radius: 2px;
    font-size: 12px;
    z-index: 100;
    animation: toast-in 0.2s ease;
    pointer-events: none;
}
.toast-ok { background: var(--green-dim); border: 1px solid #2a5a35; color: var(--green); }
.toast-err { background: var(--red-dim); border: 1px solid #5a2a2a; color: var(--red); }

@keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ── Flash on update ── */

@keyframes flash-green {
    0% { background: rgba(62, 207, 110, 0.15); }
    100% { background: transparent; }
}

@keyframes flash-red {
    0% { background: rgba(229, 69, 69, 0.15); }
    100% { background: transparent; }
}

.flash-ok { animation: flash-green 0.6s ease-out; }
.flash-err { animation: flash-red 0.6s ease-out; }

/* ── Responsive ── */

@media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .panel-full { grid-column: 1; }
    .status-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">

    <div class="header">
        <span class="header-title">Multistreamer</span>
        <div class="header-status">
            <span id="header-indicator"></span>
        </div>
    </div>

    <div class="main">

        <!-- Status -->
        <div class="panel">
            <div class="panel-label">Server</div>
            <div id="status-grid" class="status-grid">
                <div class="status-cell"><span class="status-dot dot-off"></span><span class="status-name">Loading</span></div>
            </div>
            <div id="streams-area"></div>
            <div class="btn-row">
                <button onclick="refreshStatus()">Refresh</button>
                <button onclick="doRestart()" class="act-danger">Restart</button>
                <button onclick="doDeploy()" class="act-blue">Deploy</button>
            </div>
        </div>

        <!-- Config -->
        <div class="panel">
            <div class="panel-label">Configuration</div>
            <div id="config-area" class="config-grid"></div>
            <div id="obs-area"></div>
        </div>

        <!-- Stream Info -->
        <div class="panel panel-full">
            <div class="panel-label">Stream Info</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="input-title" placeholder="Stream title">
                </div>
                <div class="form-group">
                    <label class="form-label">Game / Category</label>
                    <input type="text" id="input-game" placeholder="Game name">
                </div>
            </div>
            <div class="btn-row">
                <button onclick="doGoLive()" class="act-primary">Set Both</button>
                <button onclick="doTitle()">Title Only</button>
                <button onclick="doGame()">Game Only</button>
            </div>
            <div id="golive-result" class="result"></div>
        </div>

        <!-- Logs -->
        <div class="panel panel-full">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="panel-label" style="margin-bottom: 0;">SRS Logs</div>
                <button onclick="loadLogs()" style="padding: 4px 10px; font-size: 11px;">Load</button>
            </div>
            <div id="log-box" class="log-box" style="margin-top: 8px;">Logs will appear here.</div>
        </div>

    </div>
</div>

<script>
// ── Helpers ──

function toast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

function flash(el, ok) {
    el.classList.remove('flash-ok', 'flash-err');
    void el.offsetWidth; // reflow
    el.classList.add(ok ? 'flash-ok' : 'flash-err');
}

async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    try {
        const res = await fetch('/api/' + path, opts);
        return res.json();
    } catch (e) {
        return { ok: false, error: e.message };
    }
}

// ── Status ──

let prevContainers = {};

async function refreshStatus() {
    const data = await api('GET', 'status');
    const grid = document.getElementById('status-grid');
    const streams = document.getElementById('streams-area');
    const indicator = document.getElementById('header-indicator');

    if (!data.ok) {
        grid.innerHTML = cell('Server', false, data.error || 'Unreachable');
        indicator.textContent = '';
        streams.innerHTML = '';
        return;
    }

    let html = '';
    html += cell('SRS', data.srs_online, data.srs_online ? 'Online' : 'Offline');

    const stOk = data.stunnel === 'active';
    html += cell('Stunnel', stOk, data.stunnel);

    const containers = data.containers || {};
    for (const [name, status] of Object.entries(containers)) {
        const up = status.toLowerCase().includes('up');
        const short = name.replace('multistream-', '');
        html += cell(short, up, status.split(' (')[0]); // trim health info

        // Flash on state change
        if (prevContainers[name] !== undefined && prevContainers[name] !== up) {
            requestAnimationFrame(() => {
                const cells = grid.querySelectorAll('.status-cell');
                const idx = Object.keys(containers).indexOf(name) + 2; // offset for SRS, Stunnel
                if (cells[idx]) flash(cells[idx], up);
            });
        }
    }
    prevContainers = Object.fromEntries(Object.entries(containers).map(([k, v]) => [k, v.toLowerCase().includes('up')]));

    grid.innerHTML = html;

    // Streams
    const activeStreams = data.streams || [];
    if (activeStreams.length > 0) {
        streams.innerHTML = activeStreams.map(s =>
            `<div class="stream-live"><span class="status-dot dot-live"></span>${s.app || 'live'}/${s.name || 'stream'}</div>`
        ).join('');
        indicator.innerHTML = '<span class="status-dot dot-live" style="display:inline-block"></span> LIVE';
        indicator.style.color = 'var(--green)';
    } else {
        streams.innerHTML = '<div class="no-streams">No active streams</div>';
        indicator.textContent = 'Idle';
        indicator.style.color = 'var(--text-muted)';
    }
}

function cell(label, ok, value) {
    const dot = ok ? 'dot-ok' : 'dot-err';
    return `<div class="status-cell">
        <span class="status-dot ${dot}"></span>
        <span class="status-name">${label}</span>
        <span class="status-val">${value}</span>
    </div>`;
}

// ── Config ──

async function refreshConfig() {
    const data = await api('GET', 'config');
    const area = document.getElementById('config-area');
    const obs = document.getElementById('obs-area');

    let html = '';
    html += cfgBadge('Server', data.server_ip);
    html += cfgBadge('Twitch Key', data.has_twitch_key);
    html += cfgBadge('Kick Key', data.has_kick_key);
    html += cfgBadge('Twitch API', data.has_twitch_api);
    html += cfgBadge('Kick API', data.has_kick_api);
    area.innerHTML = html;

    if (data.server_ip) {
        obs.innerHTML = `<div class="obs-hint">OBS &rarr; rtmp://${data.server_ip}/live &middot; Key: livestream</div>`;
    } else {
        obs.innerHTML = '';
    }
}

function cfgBadge(label, ok) {
    return `<span class="config-item ${ok ? 'ok' : 'missing'}">${ok ? '\u2713' : '\u2717'} ${label}</span>`;
}

// ── Actions ──

async function doRestart() {
    toast('Restarting...', true);
    const data = await api('POST', 'restart');
    toast(data.ok ? 'Restarted' : 'Restart failed', data.ok);
    setTimeout(refreshStatus, 2500);
}

async function doDeploy() {
    toast('Deploying...', true);
    const data = await api('POST', 'deploy');
    toast(data.ok ? 'Deployed' : 'Deploy failed', data.ok);
    setTimeout(refreshStatus, 3000);
}

// ── Stream Info ──

async function doGoLive() {
    const title = document.getElementById('input-title').value.trim();
    const game = document.getElementById('input-game').value.trim();
    if (!title && !game) { toast('Enter a title or game', false); return; }
    await sendStreamInfo({ title, game });
}

async function doTitle() {
    const title = document.getElementById('input-title').value.trim();
    if (!title) { toast('Enter a title', false); return; }
    await sendStreamInfo({ title, game: '' });
}

async function doGame() {
    const game = document.getElementById('input-game').value.trim();
    if (!game) { toast('Enter a game', false); return; }
    await sendStreamInfo({ title: '', game });
}

async function sendStreamInfo(body) {
    const el = document.getElementById('golive-result');
    el.className = 'result result-pending';
    el.textContent = 'Updating...';

    const data = await api('POST', 'golive', body);

    if (data.ok) {
        const r = data.results;
        const parts = [];
        if (r.twitch) parts.push(`Twitch: ${r.twitch}`);
        if (r.kick) parts.push(`Kick: ${r.kick}`);
        const allOk = r.twitch === 'updated' && r.kick === 'updated';
        el.className = 'result ' + (allOk ? 'result-ok' : 'result-err');
        el.textContent = parts.join('  \u00b7  ');
        flash(el, allOk);
    } else {
        el.className = 'result result-err';
        el.textContent = data.error || 'Failed';
    }
}

// Allow Enter key to submit
document.getElementById('input-title').addEventListener('keydown', e => { if (e.key === 'Enter') doGoLive(); });
document.getElementById('input-game').addEventListener('keydown', e => { if (e.key === 'Enter') doGoLive(); });

// ── Logs ──

async function loadLogs() {
    const el = document.getElementById('log-box');
    el.textContent = 'Loading...';
    const data = await api('GET', 'logs');
    el.textContent = data.output || 'No logs available';
    el.scrollTop = el.scrollHeight;
}

// ── Init ──

refreshStatus();
refreshConfig();
setInterval(refreshStatus, 10000);
</script>
</body>
</html>

version: '3.8'

services:
  srs:
    image: ossrs/srs:5
    container_name: multistream-srs
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest
      - "8080:8080"   # HTTP server (HLS, HTTP-FLV, API console)
      - "1985:1985"   # HTTP API
    command: ./objs/srs -c conf/srs.conf
    volumes:
      - ./conf/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - ./logs:/usr/local/srs/objs/logs
    environment:
      - TZ=UTC

  forward-twitch:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: multistream-twitch
    restart: unless-stopped
    depends_on:
      - srs
    network_mode: host
    command: >
      -hide_banner -loglevel warning
      -i rtmp://127.0.0.1:1935/live/livestream
      -c copy -f flv
      rtmp://live.twitch.tv/app/TWITCH_STREAM_KEY

  forward-kick:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: multistream-kick
    restart: unless-stopped
    depends_on:
      - srs
    network_mode: host
    command: >
      -hide_banner -loglevel warning
      -i rtmp://127.0.0.1:1935/live/livestream
      -c copy -f flv
      rtmp://127.0.0.1:1936/app/KICK_STREAM_KEY

  # Uncomment to stream to Rumble
  # forward-rumble:
  #   image: jrottenberg/ffmpeg:4.4-alpine
  #   container_name: multistream-rumble
  #   restart: unless-stopped
  #   depends_on:
  #     - srs
  #   network_mode: host
  #   command: >
  #     -hide_banner -loglevel warning
  #     -i rtmp://127.0.0.1:1935/live/livestream
  #     -c copy -f flv
  #     RUMBLE_RTMP_URL/RUMBLE_STREAM_KEY

  # Uncomment to stream to X (requires X Premium, RTMP URL from Media Studio)
  # forward-x:
  #   image: jrottenberg/ffmpeg:4.4-alpine
  #   container_name: multistream-x
  #   restart: unless-stopped
  #   depends_on:
  #     - srs
  #   network_mode: host
  #   command: >
  #     -hide_banner -loglevel warning
  #     -i rtmp://127.0.0.1:1935/live/livestream
  #     -c copy -f flv
  #     X_RTMP_URL/X_STREAM_KEY

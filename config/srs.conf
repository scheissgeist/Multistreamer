# SRS Multistream Configuration
# Streams to Twitch and Kick simultaneously
# Deploy: scp this to /opt/multistream/conf/srs.conf on the server

listen              1935;
max_connections     100;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    forward {
        enabled         on;

        # TWITCH
        destination     rtmp://live.twitch.tv/app/TWITCH_STREAM_KEY;

        # KICK (via stunnel on localhost:1936 -> rtmps to Kick)
        destination     rtmp://127.0.0.1:1936/app/KICK_STREAM_KEY;

        # YOUTUBE (uncomment and add key when ready)
        # destination     rtmp://a.rtmp.youtube.com/live2/YOUTUBE_STREAM_KEY;
    }
}

; Stunnel config for Kick RTMPS
; Listens on localhost:1936, wraps in TLS, forwards to Kick's RTMP ingest
; Deploy: copy to /etc/stunnel/kick.conf on your server
;
; To find your Kick ingest server, check your Kick dashboard
; or use: nslookup global-contribute.live-video.net

pid = /var/run/stunnel4/stunnel.pid

[kick]
client = yes
accept = 127.0.0.1:1936
connect = global-contribute.live-video.net:443
verifyChain = no

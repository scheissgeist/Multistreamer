; Stunnel config for Kick RTMPS
; SRS forwards to localhost:1936, stunnel wraps in TLS and sends to Kick
; Deploy: scp this to /etc/stunnel/kick.conf on the server

pid = /var/run/stunnel4/stunnel.pid

[kick]
client = yes
accept = 127.0.0.1:1936
connect = fa723fc1b171.global-contribute.live-video.net:443
verifyChain = no
